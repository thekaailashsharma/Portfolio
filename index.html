    <style>
      :root, .dark {
        --surface-0: #09090b;
        --surface-1: #0f0f12;
        --surface-2: #17171a;
        --surface-3: #1e1e22;
        --surface-4: #27272a;
        --accent: #c8a87c;
        --accent-dim: #a08660;
        --accent-bright: #e8d4b4;
        --note: #6b7280;
        --text-primary: #e4e4e7;
        --text-secondary: #a1a1aa;
        --text-muted: #71717a;
        --grain-opacity: 0.025;
        --grid-opacity: 0.03;
        color-scheme: dark;
      }
      .light {
        --surface-0: #f7f4eb;
        --surface-1: #f2efe4;
        --surface-2: #e6e2d6;
        --surface-3: #d4d0c4;
        --surface-4: #c0bcb0;
        --accent: #8b6f47;
        --accent-dim: #6d573a;
        --accent-bright: #5c432a;
        --note: #78716c;
        --text-primary: #1c1917;
        --text-secondary: #44403c;
        --text-muted: #78716c;
        --grain-opacity: 0.015;
        --grid-opacity: 0.04;
        color-scheme: light;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; background: var(--surface-0); scrollbar-width: thin; scrollbar-color: var(--surface-4) var(--surface-0); }
      body { background: var(--surface-0); color: var(--text-primary); font-family: 'Space Grotesk', system-ui, sans-serif; overflow-x: hidden; transition: background 0.4s ease, color 0.4s ease; }
      ::selection { background: rgba(200, 168, 124, 0.25); color: var(--accent-bright); }
      .light ::selection { background: rgba(139, 111, 71, 0.2); color: #1c1917; }
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: var(--surface-0); }
      ::-webkit-scrollbar-thumb { background: var(--surface-4); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--surface-3); }

      @keyframes grain {
        0%, 100% { transform: translate(0,0) }
        10% { transform: translate(-5%,-10%) }
        20% { transform: translate(-15%,5%) }
        30% { transform: translate(7%,-25%) }
        40% { transform: translate(-5%,25%) }
        50% { transform: translate(-15%,10%) }
        60% { transform: translate(15%,0%) }
        70% { transform: translate(0%,15%) }
        80% { transform: translate(3%,35%) }
        90% { transform: translate(-10%,10%) }
      }
      .grain-overlay::after {
        content: '';
        position: fixed;
        top: -50%; left: -50%;
        width: 200%; height: 200%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        animation: grain 8s steps(10) infinite;
        pointer-events: none;
        z-index: 9999;
        opacity: var(--grain-opacity);
      }

      nav, section, div, aside, article, a, span, p, h1, h2, h3, h4 {
        transition: background-color 0.35s ease, border-color 0.35s ease, color 0.35s ease;
      }

      @keyframes breathe {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.8; }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }

      .animate-breathe { animation: breathe 3s ease-in-out infinite; }
      .animate-float { animation: float 4s ease-in-out infinite; }

      /* Splash screen */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        transition: opacity 0.5s ease;
      }
      .light #splash { background: #f7f4eb; }
      .dark #splash { background: #09090b; }
      #splash.fade-out { opacity: 0; pointer-events: none; }
      #splash-monogram {
        font-family: 'Instrument Serif', Georgia, serif;
        font-size: 48px;
        margin-bottom: 24px;
        opacity: 0;
        animation: splashFadeIn 0.6s ease 0.1s forwards;
      }
      .light #splash-monogram { color: #8b6f47; }
      .dark #splash-monogram { color: #c8a87c; }
      #splash-fact {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-size: 13px;
        max-width: 280px;
        line-height: 1.7;
        opacity: 0;
        animation: splashFadeIn 0.6s ease 0.4s forwards;
      }
      .light #splash-fact { color: #78716c; }
      .dark #splash-fact { color: #71717a; }
      #splash-bar {
        position: absolute;
        bottom: 40px;
        width: 60px;
        height: 2px;
        border-radius: 1px;
        overflow: hidden;
      }
      .light #splash-bar { background: #d4d0c4; }
      .dark #splash-bar { background: #27272a; }
      #splash-bar-fill {
        height: 100%;
        border-radius: 1px;
        animation: splashProgress 1.5s ease forwards;
      }
      .light #splash-bar-fill { background: #8b6f47; }
      .dark #splash-bar-fill { background: #c8a87c; }
      @keyframes splashFadeIn { to { opacity: 1; } }
      @keyframes splashProgress { from { width: 0; } to { width: 100%; } }
    </style>
    <script>
      (function() {
        var stored = localStorage.getItem('ks-theme');
        var theme = stored || 'light';
        document.documentElement.classList.remove('light', 'dark');
        document.documentElement.classList.add(theme);
      })();
    </script>
